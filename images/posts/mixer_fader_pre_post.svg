<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mixer channel fader with Pre and Post buttons</title>
<desc>A professional audio mixer channel strip showing a vertical fader with Pre and Post send buttons, EQ controls, and auxiliary sends</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  .panel { fill: #2a2a2a; }
  .panel-light { fill: #333; }
  .fader-track { fill: #1a1a1a; stroke: #555; stroke-width: 0.5; }
  .fader-cap { fill: #c8c8c8; stroke: #999; stroke-width: 0.5; }
  .fader-cap-line { stroke: #666; stroke-width: 1; }
  .knob { fill: #3a3a3a; stroke: #666; stroke-width: 0.5; }
  .knob-dot { fill: #f0c040; }
  .label { fill: #aaa; font-family: sans-serif; font-size: 11px; text-anchor: middle; }
  .label-small { fill: #888; font-family: sans-serif; font-size: 9px; text-anchor: middle; }
  .meter-seg-on-green { fill: #44cc44; }
  .meter-seg-on-yellow { fill: #cccc22; }
  .meter-seg-on-red { fill: #cc2222; }
  .channel-num { fill: #eee; font-family: sans-serif; font-size: 13px; font-weight: bold; text-anchor: middle; }
  .btn-pre { fill: #1a3a1a; stroke: #3a7a3a; stroke-width: 1; }
  .btn-post { fill: #1a1a3a; stroke: #3a3a9a; stroke-width: 1; }
  .btn-pre-label { fill: #55dd55; font-family: sans-serif; font-size: 11px; font-weight: bold; text-anchor: middle; }
  .btn-post-label { fill: #5577ff; font-family: sans-serif; font-size: 11px; font-weight: bold; text-anchor: middle; }
  .btn-label { fill: #888; font-family: sans-serif; font-size: 10px; text-anchor: middle; }
  .divider { stroke: #444; stroke-width: 0.5; }
  .tick { stroke: #555; stroke-width: 0.5; }
  .tick-label { fill: #777; font-family: sans-serif; font-size: 9px; text-anchor: end; }
  .callout-box { fill: #1e2e1e; stroke: #3a7a3a; stroke-width: 1; }
  .callout-box-blue { fill: #1e1e2e; stroke: #3a3a9a; stroke-width: 1; }
  .callout-label { fill: #55dd55; font-family: sans-serif; font-size: 12px; font-weight: bold; }
  .callout-label-blue { fill: #7799ff; font-family: sans-serif; font-size: 12px; font-weight: bold; }
  .callout-text { fill: #aaa; font-family: sans-serif; font-size: 11px; }
  .callout-line { stroke: #3a7a3a; stroke-width: 1; stroke-dasharray: 4 3; }
  .callout-line-blue { stroke: #3a3a9a; stroke-width: 1; stroke-dasharray: 4 3; }
</style>

<!-- Background panel -->
<rect x="200" y="20" width="180" height="780" rx="6" class="panel"/>
<rect x="205" y="25" width="170" height="770" rx="4" class="panel-light"/>

<!-- Channel label top -->
<rect x="215" y="32" width="150" height="22" rx="3" fill="#111"/>
<text x="290" y="48" class="channel-num">CH 1</text>

<!-- GAIN -->
<text x="290" y="72" class="label">GAIN</text>
<circle cx="290" cy="92" r="16" class="knob"/>
<circle cx="290" cy="82" r="2.5" class="knob-dot"/>
<text x="290" y="118" class="label-small">+12dB</text>

<!-- EQ SECTION -->
<line x1="215" y1="130" x2="365" y2="130" class="divider"/>
<text x="290" y="145" class="label">EQ</text>

<text x="248" y="162" class="label-small">HI</text>
<circle cx="248" cy="178" r="13" class="knob"/>
<circle cx="248" cy="167" r="2" class="knob-dot"/>

<text x="290" y="162" class="label-small">MID</text>
<circle cx="290" cy="178" r="13" class="knob"/>
<circle cx="290" cy="167" r="2" class="knob-dot"/>

<text x="332" y="162" class="label-small">LO</text>
<circle cx="332" cy="178" r="13" class="knob"/>
<circle cx="332" cy="168" r="2" class="knob-dot"/>

<!-- AUX SEND SECTION -->
<line x1="215" y1="200" x2="365" y2="200" class="divider"/>
<text x="290" y="216" class="label">AUX SEND</text>

<text x="248" y="232" class="label-small">AUX 1</text>
<circle cx="248" cy="248" r="13" class="knob"/>
<circle cx="248" cy="237" r="2" class="knob-dot"/>
<rect x="229" y="263" width="38" height="18" rx="3" class="btn-pre"/>
<text x="248" y="276" class="btn-pre-label">PRE</text>

<text x="332" y="232" class="label-small">AUX 2</text>
<circle cx="332" cy="248" r="13" class="knob"/>
<circle cx="332" cy="237" r="2" class="knob-dot"/>
<rect x="313" y="263" width="38" height="18" rx="3" class="btn-post"/>
<text x="332" y="276" class="btn-post-label">POST</text>

<text x="248" y="295" class="label-small">AUX 3</text>
<circle cx="248" cy="311" r="13" class="knob"/>
<circle cx="248" cy="300" r="2" class="knob-dot"/>
<rect x="229" y="326" width="38" height="18" rx="3" class="btn-pre"/>
<text x="248" y="339" class="btn-pre-label">PRE</text>

<text x="332" y="295" class="label-small">AUX 4</text>
<circle cx="332" cy="311" r="13" class="knob"/>
<circle cx="332" cy="300" r="2" class="knob-dot"/>
<rect x="313" y="326" width="38" height="18" rx="3" class="btn-post"/>
<text x="332" y="339" class="btn-post-label">POST</text>

<!-- MISC BUTTONS -->
<line x1="215" y1="352" x2="365" y2="352" class="divider"/>
<rect x="219" y="358" width="44" height="16" rx="3" fill="#2a1a1a" stroke="#884444" stroke-width="0.5"/>
<text x="241" y="370" class="btn-label" fill="#cc6666">PFL</text>
<rect x="268" y="358" width="44" height="16" rx="3" fill="#1a1a2a" stroke="#446688" stroke-width="0.5"/>
<text x="290" y="370" class="btn-label" fill="#6688cc">MUTE</text>
<rect x="317" y="358" width="44" height="16" rx="3" fill="#1a2a1a" stroke="#448844" stroke-width="0.5"/>
<text x="339" y="370" class="btn-label" fill="#66cc66">SOLO</text>

<!-- PAN -->
<line x1="215" y1="382" x2="365" y2="382" class="divider"/>
<text x="290" y="397" class="label">PAN</text>
<circle cx="290" cy="414" r="15" class="knob"/>
<line x1="290" y1="400" x2="290" y2="408" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>

<!-- FADER SECTION -->
<line x1="215" y1="438" x2="365" y2="438" class="divider"/>

<!-- Meter L -->
<rect x="219" y="444" width="14" height="220" rx="2" class="fader-track"/>
<rect x="220" y="607" width="12" height="12" rx="1" class="meter-seg-on-red"/>
<rect x="220" y="594" width="12" height="12" rx="1" class="meter-seg-on-red"/>
<rect x="220" y="581" width="12" height="12" rx="1" class="meter-seg-on-yellow"/>
<rect x="220" y="568" width="12" height="12" rx="1" class="meter-seg-on-yellow"/>
<rect x="220" y="555" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="220" y="542" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="220" y="529" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="220" y="516" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="220" y="503" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="220" y="490" width="12" height="12" rx="1" fill="#1a1a1a"/>
<rect x="220" y="477" width="12" height="12" rx="1" fill="#1a1a1a"/>
<rect x="220" y="464" width="12" height="12" rx="1" fill="#1a1a1a"/>
<rect x="220" y="451" width="12" height="12" rx="1" fill="#1a1a1a"/>

<!-- Meter R -->
<rect x="235" y="444" width="14" height="220" rx="2" class="fader-track"/>
<rect x="236" y="607" width="12" height="12" rx="1" class="meter-seg-on-red"/>
<rect x="236" y="594" width="12" height="12" rx="1" class="meter-seg-on-yellow"/>
<rect x="236" y="581" width="12" height="12" rx="1" class="meter-seg-on-yellow"/>
<rect x="236" y="568" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="236" y="555" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="236" y="542" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="236" y="529" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="236" y="516" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="236" y="503" width="12" height="12" rx="1" class="meter-seg-on-green"/>
<rect x="236" y="490" width="12" height="12" rx="1" fill="#1a1a1a"/>
<rect x="236" y="477" width="12" height="12" rx="1" fill="#1a1a1a"/>
<rect x="236" y="464" width="12" height="12" rx="1" fill="#1a1a1a"/>
<rect x="236" y="451" width="12" height="12" rx="1" fill="#1a1a1a"/>

<!-- Scale ticks -->
<line x1="254" y1="451" x2="258" y2="451" class="tick"/>
<text x="253" y="455" class="tick-label">+10</text>
<line x1="254" y1="490" x2="258" y2="490" class="tick"/>
<text x="253" y="494" class="tick-label">0</text>
<line x1="254" y1="529" x2="258" y2="529" class="tick"/>
<text x="253" y="533" class="tick-label">-10</text>
<line x1="254" y1="568" x2="258" y2="568" class="tick"/>
<text x="253" y="572" class="tick-label">-20</text>
<line x1="254" y1="607" x2="258" y2="607" class="tick"/>
<text x="253" y="611" class="tick-label">-40</text>

<!-- Fader track main -->
<rect x="270" y="444" width="20" height="220" rx="4" class="fader-track"/>

<!-- Unity mark -->
<line x1="264" y1="534" x2="296" y2="534" stroke="#f0c040" stroke-width="0.8" stroke-dasharray="3 2"/>
<text x="302" y="538" class="label-small" fill="#f0c040" style="text-anchor:start">0dB</text>

<!-- Fader cap -->
<rect x="258" y="490" width="44" height="26" rx="3" class="fader-cap"/>
<line x1="264" y1="503" x2="296" y2="503" class="fader-cap-line"/>
<line x1="264" y1="499" x2="296" y2="499" class="fader-cap-line"/>
<line x1="264" y1="507" x2="296" y2="507" class="fader-cap-line"/>

<text x="280" y="678" class="label">FADER</text>

<!-- Channel bottom -->
<rect x="219" y="687" width="142" height="28" rx="3" fill="#111"/>
<text x="290" y="705" class="channel-num">CH 1</text>

<!-- CALLOUT: PRE -->
<rect x="229" y="263" width="38" height="18" rx="3" stroke="#55dd55" stroke-width="2" fill="none" opacity="0.8"/>
<rect x="30" y="230" width="160" height="80" rx="5" class="callout-box"/>
<text x="45" y="250" class="callout-label">PRE (Pre-Fader)</text>
<text x="45" y="266" class="callout-text">ส่งสัญญาณก่อนถึง Fader</text>
<text x="45" y="280" class="callout-text">ระดับเสียงคงที่ไม่ขึ้นกับ Fader</text>
<text x="45" y="294" class="callout-text">ใช้สำหรับ Monitor Mix</text>
<line x1="229" y1="272" x2="190" y2="272" class="callout-line"/>

<!-- CALLOUT: POST -->
<rect x="313" y="263" width="38" height="18" rx="3" stroke="#7799ff" stroke-width="2" fill="none" opacity="0.8"/>
<rect x="390" y="230" width="168" height="80" rx="5" class="callout-box-blue"/>
<text x="405" y="250" class="callout-label-blue">POST (Post-Fader)</text>
<text x="405" y="266" class="callout-text">ส่งสัญญาณหลัง Fader</text>
<text x="405" y="280" class="callout-text">ระดับเสียงตามการปรับ Fader</text>
<text x="405" y="294" class="callout-text">ใช้สำหรับ Effect Send</text>
<line x1="351" y1="272" x2="390" y2="272" class="callout-line-blue"/>

<!-- PRE row 2 highlight -->
<rect x="229" y="326" width="38" height="18" rx="3" stroke="#55dd55" stroke-width="2" fill="none" opacity="0.8"/>
<line x1="229" y1="335" x2="190" y2="312" class="callout-line"/>

<!-- POST row 2 highlight -->
<rect x="313" y="326" width="38" height="18" rx="3" stroke="#7799ff" stroke-width="2" fill="none" opacity="0.8"/>
<line x1="351" y1="335" x2="390" y2="310" class="callout-line-blue"/>

<!-- Signal flow diagram -->
<rect x="30" y="720" width="600" height="80" rx="5" fill="#1c1c1c" stroke="#444" stroke-width="0.5"/>
<text x="40" y="740" fill="#888" font-family="sans-serif" font-size="11px">Signal flow:</text>

<rect x="40" y="748" width="60" height="20" rx="3" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
<text x="70" y="762" fill="#ccc" font-family="sans-serif" font-size="10px" text-anchor="middle">Input</text>
<line x1="100" y1="758" x2="125" y2="758" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="125" y="748" width="60" height="20" rx="3" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
<text x="155" y="762" fill="#ccc" font-family="sans-serif" font-size="10px" text-anchor="middle">Gain/EQ</text>
<line x1="185" y1="758" x2="210" y2="758" stroke="#555" stroke-width="1"/>
<line x1="197" y1="750" x2="197" y2="735" stroke="#44aa44" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<text x="197" y="730" fill="#55dd55" font-family="sans-serif" font-size="9px" text-anchor="middle">PRE tap</text>

<rect x="210" y="748" width="60" height="20" rx="3" fill="#1a2f1a" stroke="#3a7a3a" stroke-width="1"/>
<text x="240" y="762" fill="#88dd88" font-family="sans-serif" font-size="10px" text-anchor="middle">FADER</text>
<line x1="270" y1="758" x2="295" y2="758" stroke="#555" stroke-width="1"/>
<line x1="282" y1="750" x2="282" y2="735" stroke="#4444aa" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
<text x="282" y="730" fill="#7799ff" font-family="sans-serif" font-size="9px" text-anchor="middle">POST tap</text>

<rect x="295" y="748" width="60" height="20" rx="3" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
<text x="325" y="762" fill="#ccc" font-family="sans-serif" font-size="10px" text-anchor="middle">Pan</text>
<line x1="355" y1="758" x2="380" y2="758" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="380" y="748" width="60" height="20" rx="3" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
<text x="410" y="762" fill="#ccc" font-family="sans-serif" font-size="10px" text-anchor="middle">Bus/Mix</text>

</svg>
